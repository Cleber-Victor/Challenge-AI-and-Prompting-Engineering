<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Plataforma Educativa AI</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #6366f1;
            --primary-hover: #4f46e5;
            --bg-color: #0f172a;
            --surface: rgba(30, 41, 59, 0.7);
            --border: rgba(255, 255, 255, 0.1);
            --text: #f8fafc;
            --text-muted: #94a3b8;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: linear-gradient(135deg, #0f172a 0%, #1e1b4b 100%);
            color: var(--text);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 2rem;
        }

        .container {
            width: 100%;
            max-width: 800px;
            background: var(--surface);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid var(--border);
            border-radius: 24px;
            padding: 3rem;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            animation: fadeIn 0.8s ease-out;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        h1 {
            font-size: 2.5rem;
            font-weight: 700;
            margin-bottom: 0.5rem;
            background: linear-gradient(to right, #818cf8, #c084fc);
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
            text-align: center;
        }

        p.subtitle {
            text-align: center;
            color: var(--text-muted);
            margin-bottom: 2.5rem;
            font-size: 1.1rem;
        }

        .form-group {
            margin-bottom: 1.5rem;
        }

        label {
            display: block;
            margin-bottom: 0.5rem;
            font-weight: 600;
            font-size: 0.95rem;
            color: #e2e8f0;
        }

        select, input {
            width: 100%;
            padding: 1rem;
            background: rgba(15, 23, 42, 0.6);
            border: 1px solid var(--border);
            border-radius: 12px;
            color: white;
            font-size: 1rem;
            font-family: inherit;
            transition: all 0.3s ease;
        }

        select:focus, input:focus {
            outline: none;
            border-color: var(--primary);
            box-shadow: 0 0 0 3px rgba(99, 102, 241, 0.2);
        }

        button {
            width: 100%;
            padding: 1rem;
            background: var(--primary);
            color: white;
            border: none;
            border-radius: 12px;
            font-size: 1.1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            margin-top: 1rem;
            position: relative;
            overflow: hidden;
        }

        button:hover {
            background: var(--primary-hover);
            transform: translateY(-2px);
            box-shadow: 0 10px 15px -3px rgba(99, 102, 241, 0.4);
        }

        button:active {
            transform: translateY(0);
        }

        .results {
            margin-top: 3rem;
            display: none;
            animation: fadeIn 0.5s ease-out;
        }

        .results h2 {
            font-size: 1.5rem;
            margin-bottom: 1rem;
            color: #e2e8f0;
            border-bottom: 1px solid var(--border);
            padding-bottom: 0.5rem;
        }

        pre {
            background: rgba(0, 0, 0, 0.3);
            padding: 1.5rem;
            border-radius: 12px;
            border: 1px solid var(--border);
            overflow-x: auto;
            color: #a7f3d0;
            font-size: 0.9rem;
            line-height: 1.5;
            white-space: pre-wrap;
            word-wrap: break-word;
        }

        .loader {
            display: none;
            text-align: center;
            margin-top: 2rem;
        }

        .spinner {
            width: 40px;
            height: 40px;
            border: 4px solid rgba(255, 255, 255, 0.1);
            border-left-color: var(--primary);
            border-radius: 50%;
            animation: spin 1s linear infinite;
            display: inline-block;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .loading-text {
            display: block;
            margin-top: 1rem;
            color: var(--primary);
            font-weight: 600;
            animation: pulse 1.5s infinite;
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>Plataforma Educativa AI</h1>
        <p class="subtitle">Gere conteúdos personalizados com Engenharia de Prompt Avançada</p>

        <form id="genForm">
            <div class="form-group">
                <label for="studentId">Selecione o Aluno (Perfil)</label>
                <select id="studentId" required>
                    <option value="" disabled selected>Carregando alunos...</option>
                </select>
            </div>

            <div class="form-group">
                <label for="topic">Tópico de Estudo</label>
                <input type="text" id="topic" placeholder="Ex: Fotossíntese, Revolução Industrial, Física Quântica..." required>
            </div>

            <div class="form-group">
                <label for="materialType">Tipo de Material</label>
                <select id="materialType" required>
                    <option value="conceitual">Explicação Conceitual</option>
                    <option value="pratico">Exemplos Práticos</option>
                    <option value="reflexao">Perguntas de Reflexão</option>
                    <option value="visual">Resumo Visual</option>
                </select>
            </div>

            <div class="form-group">
                <label for="promptVersion">Versão do Prompt</label>
                <select id="promptVersion" required>
                    <option value="v2">Versão 2 (Avançada / Otimizada)</option>
                    <option value="v1">Versão 1 (Básica / Simples)</option>
                </select>
            </div>

            <button type="submit" id="submitBtn">Gerar Material Educativo</button>
        </form>

        <div class="loader" id="loader">
            <div class="spinner"></div>
            <span class="loading-text">Processando prompts e consultando a IA...</span>
        </div>

        <div class="results" id="results">
            <h2 id="resultTitle">Resultado Gerado</h2>
            <pre id="outputJson"></pre>
        </div>
    </div>

    <script>
        // Carregar Estudantes na inicialização
        window.addEventListener('DOMContentLoaded', async () => {
            try {
                const response = await fetch('/students');
                const students = await response.json();
                const selectInfo = document.getElementById('studentId');
                
                selectInfo.innerHTML = '<option value="" disabled selected>Escolha um aluno</option>';
                students.forEach(student => {
                    const option = document.createElement('option');
                    option.value = student.id;
                    option.textContent = `${student.nome} - Idade: ${student.idade} | Nível: ${student.nivel} | Estilo: ${student.estilo_aprendizado}`;
                    selectInfo.appendChild(option);
                });
            } catch (error) {
                console.error('Erro ao buscar alunos:', error);
                document.getElementById('studentId').innerHTML = '<option value="" disabled>Erro ao carregar alunos. A API está rodando?</option>';
            }
        });

        // Lidar com o Formulário
        document.getElementById('genForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const studentId = document.getElementById('studentId').value;
            const topic = document.getElementById('topic').value;
            const materialType = document.getElementById('materialType').value;
            const promptVersion = document.getElementById('promptVersion').value;
            const typeText = document.getElementById('materialType').options[document.getElementById('materialType').selectedIndex].text;
            const btn = document.getElementById('submitBtn');
            const loader = document.getElementById('loader');
            const results = document.getElementById('results');
            const outputJson = document.getElementById('outputJson');
            const resultTitle = document.getElementById('resultTitle');

            if(!studentId || !topic || !materialType) return;

            // UI feedback
            btn.disabled = true;
            btn.style.opacity = '0.7';
            results.style.display = 'none';
            loader.style.display = 'block';

            try {
                const response = await fetch('/generate', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ studentId, topic, type: materialType, version: promptVersion })
                });

                const data = await response.json();
                
                if(data.success) {
                    resultTitle.textContent = `Resultado Gerado (${typeText})`;
                    
                    let outputText = "";
                    const r = data.resposta;
                    
                    if (r.explicacao) {
                        outputText = r.explicacao;
                    } else if (r.exemplos && Array.isArray(r.exemplos)) {
                        outputText = r.exemplos.map(ex => `### ${ex.titulo || ''}\n${ex.descricao || ''}`).join("\n\n");
                    } else if (r.perguntas && Array.isArray(r.perguntas)) {
                        outputText = r.perguntas.map(p => `${p.id || '-'}. ${p.pergunta || ''}`).join("\n\n");
                    } else if (r.diagrama_ascii) {
                        outputText = r.diagrama_ascii;
                    } else {
                        outputText = JSON.stringify(r, null, 2);
                    }

                    outputJson.textContent = outputText;
                    results.style.display = 'block';
                } else {
                    outputJson.textContent = `Erro: ${data.error}`;
                    results.style.display = 'block';
                }
            } catch (error) {
                outputJson.textContent = `Falha na requisição: ${error.message}`;
                results.style.display = 'block';
            } finally {
                btn.disabled = false;
                btn.style.opacity = '1';
                loader.style.display = 'none';
            }
        });
    </script>
</body>
</html>
